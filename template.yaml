AWSTemplateFormatVersion: '2010-09-09'

Description: Auto Scaling Group with CloudFormation

Resources:

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  MyLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: my-launch-template

      LaunchTemplateData:
        ImageId: ami-024ebedf48d280810
        InstanceType: t3.micro

        SecurityGroupIds:
          - !Ref MySecurityGroup
